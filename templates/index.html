<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛒 Grocery Price Estimator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover { background: #f0f0ff; }
        .upload-area input { display: none; }
        .upload-icon { font-size: 3rem; margin-bottom: 10px; }
        .upload-text { color: #666; font-size: 1.1rem; }
        #preview {
            max-width: 100%;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .results { margin-top: 30px; display: none; }
        .product-card {
            background: #f8f9ff;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #667eea;
        }
        .product-name { font-weight: bold; font-size: 1.1rem; color: #333; }
        .product-conf { color: #888; font-size: 0.9rem; }
        .product-price { font-size: 1.2rem; color: #667eea; font-weight: bold; }
        .total-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            color: white;
            margin-top: 15px;
        }
        .total-label { font-size: 1rem; opacity: 0.9; }
        .total-amount { font-size: 2.5rem; font-weight: bold; }
        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
            display: none;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 Grocery Price Estimator</h1>
        <p class="subtitle">Upload a photo to detect products and estimate total cost</p>

        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <input type="file" id="fileInput" accept="image/*" onchange="previewImage(event)">
            <div class="upload-icon">📸</div>
            <div class="upload-text">Click to upload image</div>
        </div>

        <img id="preview" alt="Preview">

        <button class="btn" id="detectBtn" onclick="detect()" disabled>
            🔍 Detect Products & Calculate Price
        </button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Detecting products...</p>
        </div>

        <div class="results" id="results">
            <h2 style="margin-bottom:15px; color:#333;">Detected Products</h2>
            <div id="productsList"></div>
            <div class="total-card">
                <div class="total-label">Total Price</div>
                <div class="total-amount" id="totalPrice">$0.00</div>
                <div id="productCount" style="opacity:0.8; margin-top:5px;"></div>
            </div>
        </div>
    </div>

    <script>
        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            const preview = document.getElementById('preview');
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
            document.getElementById('detectBtn').disabled = false;
            document.getElementById('results').style.display = 'none';
        }

        async function detect() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;

            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            document.getElementById('detectBtn').disabled = true;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/detect', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('results').style.display = 'block';
                document.getElementById('detectBtn').disabled = false;

                const productsList = document.getElementById('productsList');
                productsList.innerHTML = '';

                data.products.forEach(p => {
                    productsList.innerHTML += `
                        <div class="product-card">
                            <div>
                                <div class="product-name">${p.name}</div>
                                <div class="product-conf">Confidence: ${p.confidence}%</div>
                            </div>
                            <div class="product-price">$${p.price.toFixed(2)}</div>
                        </div>`;
                });

                document.getElementById('totalPrice').textContent = `$${data.total_price.toFixed(2)}`;
                document.getElementById('productCount').textContent = `${data.count} product(s) detected`;

            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('detectBtn').disabled = false;
                alert('Error: ' + error.message);
            }
        }
    </script>
</body>
</html>
